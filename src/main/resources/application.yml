spring:
  application:
    name: ngx-trading-bot
  datasource:
    url: jdbc:postgresql://localhost:5432/ngx_trading
    username: ${DB_USERNAME:trader}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,flyway
  endpoint:
    health:
      show-details: always

eodhd:
  api-key: ${EODHD_API_KEY:}
  base-url: https://eodhd.com/api
  exchange: XNSA

trading:
  timezone: Africa/Lagos
  market-open: "10:00"
  market-close: "14:30"
  daily-price-limit-pct: 10.0
  watchlist:
    etfs:
      - STANBICETF30
      - VETGRIF30
      - MERGROWTH
      - MERVALUE
      - SIAMLETF40
      - NEWGOLD
    large-caps:
      - ZENITHBANK
      - GTCO
      - ACCESSCORP
      - UBA
      - FBNH
      - DANGCEM
      - BUACEMENT
      - SEPLAT
      - ARADEL
      - MTNN

risk:
  max-risk-per-trade-pct: 2.0
  max-single-position-pct: 15.0
  max-sector-exposure-pct: 40.0
  min-cash-reserve-pct: 20.0
  daily-loss-circuit-breaker-pct: 5.0
  weekly-loss-circuit-breaker-pct: 10.0
  max-open-positions: 10
  min-avg-daily-volume: 10000
  max-volume-participation-pct: 10.0

meritrade:
  base-url: https://web.meritrade.com
  username: ${MERITRADE_USERNAME:}
  password: ${MERITRADE_PASSWORD:}
  headless: true
  slow-mo-ms: 500
  screenshot-dir: ./screenshots
  session-max-hours: 5
  order-confirmation-delay-seconds: 3
  selectors:
    login-username: "input[name='email']"
    login-password: "input[type='password']"
    login-submit: "button[type='submit']"
    trade-buy-tab: "[data-action='buy']"
    trade-sell-tab: "[data-action='sell']"
    trade-symbol: "input.stock-search"
    trade-quantity: "input[name='quantity']"
    trade-price: "input[name='price']"
    trade-review: "button:has-text('Review')"
    trade-confirm: "button:has-text('Confirm')"

notification:
  whatsapp:
    enabled: true
    waha-base-url: http://localhost:3000
    waha-session: default
    chat-id: ${WHATSAPP_CHAT_ID:}
  telegram:
    enabled: true
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
  approval:
    timeout-minutes: 5
    default-on-timeout: REJECT

ai:
  enabled: ${AI_ENABLED:false}
  api-key: ${AI_API_KEY:}
  base-url: https://api.anthropic.com
  default-model: claude-haiku-4-5-20251001
  deep-analysis-model: claude-sonnet-4-6
  max-retries: 2
  timeout-seconds: 30
  budget:
    daily-limit-usd: 5.00
    monthly-limit-usd: 100.00
  deep-analysis-triggers:
    - EARNINGS_RELEASE
    - ACQUISITION_MERGER
    - CBN_POLICY

discovery:
  enabled: true
  max-active-watchlist-size: 30
  max-observation-slots: 20
  observation-period-days: 14
  demotion-cooldown-days: 90
  no-signal-demotion-days: 60
  min-fundamental-score: 50.0
  screener:
    min-market-cap-millions: 10.0
    min-avg-daily-volume: 10000
    min-eps: 0.0
    max-pe-ratio: 30.0
    min-revenue-growth-pct: 5.0
    max-debt-to-equity: 2.0

longterm:
  core:
    target-allocations:
      "ZENITHBANK:NGX": 10.0
      "GTCO:NGX": 8.0
      "ACCESSCORP:NGX": 5.0
      "UBA:NGX": 4.0
      "DANGCEM:NGX": 6.0
      "SEPLAT:NGX": 5.0
      "MTNN:NGX": 7.0
      "NEWGOLD:NGX": 5.0
      "VOO:US": 15.0
      "SCHD:US": 10.0
      "BND:US": 8.0
      "GLD:US": 5.0
      "VXUS:US": 7.0
      "VNQ:US": 5.0
  dca:
    enabled: true
    ngx-budget-naira-monthly: 150000
    us-budget-usd-monthly: 300
    ngx-execution-day: 5
    us-execution-day: 10
    fallback-day-if-weekend: NEXT
    top-up-on-dip-pct: 10.0
  dividend:
    reinvest: true
    reinvest-into: SAME_STOCK
    track-ex-dates: true
    alert-days-before-ex-date: 7
    us-withholding-tax-pct: 30.0
  rebalance:
    frequency: QUARTERLY
    drift-threshold-pct: 10.0
    method: THRESHOLD
    use-new-cash-first: true
    require-approval: true

strategies:
  etf-nav-arbitrage:
    enabled: true
    entry-discount-pct: 10.0
    exit-premium-pct: 20.0
    extreme-premium-pct: 50.0
    max-rsi: 60
    min-volume-ratio: 1.2
  momentum-breakout:
    enabled: true
    volume-spike-ratio: 3.0
    min-rsi: 40
    max-rsi: 65
    sma-period: 20
    atr-stop-multiplier: 2.0
    atr-target-multiplier: 4.0
  pension-flow:
    enabled: true
  us-earnings-momentum:
    enabled: true
    buy-window-days-after-earnings: 3
    min-eps-surprise-pct: 5.0
    min-revenue-surprise-pct: 2.0
  us-etf-rotation:
    enabled: true
    rotation-frequency: MONTHLY
    top-n-sectors: 3
  dividend-accumulation:
    enabled: true
    ngx-min-trailing-yield-pct: 6.0
    us-min-trailing-yield-pct: 2.5
  value-accumulation:
    enabled: true
    min-fundamental-score: 50
  dca:
    enabled: true
    ngx-execution-day: 5
    us-execution-day: 10
    ngx-monthly-budget: 150000
    us-monthly-budget: 300
  currency-hedge:
    enabled: true
    gold-target-pct: 10.0
    naira-weakness-threshold-30d-pct: 5.0
  sector-rotation:
    enabled: true

logging:
  level:
    com.ngxbot: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
