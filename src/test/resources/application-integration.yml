## Integration test profile — uses real PostgreSQL + real external services
## Activated via: -Dspring.profiles.active=integration

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ngx_trading
    username: ${DB_USERNAME:trader}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8081

eodhd:
  api-key: ${EODHD_API_KEY:}
  base-url: https://eodhd.com/api
  exchange: XNSA

trading:
  timezone: Africa/Lagos
  market-open: "10:00"
  market-close: "14:30"
  daily-price-limit-pct: 10.0
  watchlist:
    etfs:
      - STANBICETF30
      - VETGRIF30
    large-caps:
      - ZENITHBANK
      - GTCO

risk:
  max-risk-per-trade-pct: 2.0
  max-single-position-pct: 15.0
  max-sector-exposure-pct: 40.0
  min-cash-reserve-pct: 20.0
  daily-loss-circuit-breaker-pct: 5.0
  weekly-loss-circuit-breaker-pct: 10.0
  max-open-positions: 10
  min-avg-daily-volume: 10000
  max-volume-participation-pct: 10.0

meritrade:
  enabled: true
  base-url: https://app.trovefinance.com/login
  username: ${MERITRADE_USERNAME:}
  password: ${MERITRADE_PASSWORD:}
  headless: false
  slow-mo-ms: 1000
  screenshot-dir: ./screenshots/integration
  session-max-hours: 5
  order-confirmation-delay-seconds: 3
  navigation-timeout-ms: 45000
  screenshot-retention-hours: 168
  selectors:
    login-username: "input[name='email']"
    login-password: "input[type='password']"
    login-submit: "button[type='submit']"
    otp-input: "input[placeholder='Enter code here']"
    otp-submit: "button:has-text('Verify')"
    portfolio-link: "a:has-text('Portfolio'), a[href*='portfolio']"
    portfolio-rows: "table tbody tr"
    portfolio-symbol: "td:nth-child(1)"
    portfolio-quantity: "td:nth-child(3)"
    cash-balance: "[class*='balance'], [class*='cash-available']"
    fx-rate: "[class*='fx-rate'], [class*='exchange-rate']"
    trade-buy-tab: "[data-action='buy']"
    trade-sell-tab: "[data-action='sell']"
    trade-symbol: "input.stock-search"
    trade-quantity: "input[name='quantity']"
    trade-price: "input[name='price']"
    trade-review: "button:has-text('Review')"
    trade-confirm: "button:has-text('Confirm')"

otp:
  email:
    enabled: ${OTP_EMAIL_ENABLED:true}
    imap-host: imap.gmail.com
    imap-port: 993
    username: ${OTP_EMAIL_USERNAME:}
    password: ${OTP_EMAIL_PASSWORD:}
    sender-filter: trove
    poll-interval-seconds: 5
    max-wait-seconds: 90

notification:
  whatsapp:
    enabled: true
    waha-base-url: http://localhost:3000
    waha-session: default
    waha-api-key: ${WAHA_API_KEY:ngx-waha-local-key}
    chat-id: ${WHATSAPP_CHAT_ID:}
  telegram:
    enabled: true
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    chat-id: ${TELEGRAM_CHAT_ID:}
  approval:
    timeout-minutes: 5
    default-on-timeout: REJECT

ai:
  enabled: ${AI_ENABLED:true}
  api-key: ${AI_API_KEY:}
  base-url: https://api.anthropic.com
  default-model: claude-haiku-4-5-20251001
  deep-analysis-model: claude-sonnet-4-6
  max-retries: 2
  timeout-seconds: 30
  budget:
    daily-limit-usd: 5.00
    monthly-limit-usd: 100.00
  deep-analysis-triggers:
    - EARNINGS_RELEASE
    - ACQUISITION_MERGER
    - CBN_POLICY

discovery:
  enabled: true
  max-active-watchlist-size: 30
  max-observation-slots: 20
  observation-period-days: 14
  demotion-cooldown-days: 90
  no-signal-demotion-days: 60
  min-fundamental-score: 50.0
  screener:
    min-market-cap-millions: 10.0
    min-avg-daily-volume: 10000
    min-eps: 0.0
    max-pe-ratio: 30.0
    min-revenue-growth-pct: 5.0
    max-debt-to-equity: 2.0

longterm:
  core:
    target-allocations:
      "ZENITHBANK:NGX": 10.0
      "GTCO:NGX": 8.0
  dca:
    enabled: false
    ngx-budget-naira-monthly: 150000
    us-budget-usd-monthly: 300
    ngx-execution-day: 5
    us-execution-day: 10
    fallback-day-if-weekend: NEXT
    top-up-on-dip-pct: 10.0
  dividend:
    reinvest: false
    reinvest-into: SAME_STOCK
    track-ex-dates: true
    alert-days-before-ex-date: 7
    us-withholding-tax-pct: 30.0
  rebalance:
    frequency: QUARTERLY
    drift-threshold-pct: 10.0
    method: THRESHOLD
    use-new-cash-first: true
    require-approval: true

strategies:
  etf-nav-arbitrage:
    enabled: false
  momentum-breakout:
    enabled: false
  pension-flow:
    enabled: false
  us-earnings-momentum:
    enabled: false
  us-etf-rotation:
    enabled: false
  dividend-accumulation:
    enabled: false
  value-accumulation:
    enabled: false
  dca:
    enabled: false
  currency-hedge:
    enabled: false
  sector-rotation:
    enabled: false

logging:
  level:
    com.ngxbot: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
