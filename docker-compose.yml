services:
  ngx-bot:
    build: .
    container_name: ngx-trading-bot
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_USERNAME=trader
      - DB_PASSWORD=${DB_PASSWORD}
      - EODHD_API_KEY=${EODHD_API_KEY}
      - MERITRADE_USERNAME=${MERITRADE_USERNAME}
      - MERITRADE_PASSWORD=${MERITRADE_PASSWORD}
      - WHATSAPP_CHAT_ID=${WHATSAPP_CHAT_ID}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./screenshots:/opt/ngx-bot/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      waha:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: ngx-postgres
    restart: always
    environment:
      - POSTGRES_DB=ngx_trading
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d ngx_trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  waha:
    image: devlikeapro/waha
    container_name: ngx-waha
    restart: always
    ports:
      - "3000:3000"
    environment:
      - WHATSAPP_HOOK_URL=http://ngx-bot:8080/api/whatsapp/webhook
      - WHATSAPP_HOOK_EVENTS=message

volumes:
  pgdata:
