version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ngx-postgres
    environment:
      POSTGRES_DB: ngx_trading
      POSTGRES_USER: ${DB_USERNAME:-trader}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-trader} -d ngx_trading"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  waha:
    image: devlikeapro/waha:latest
    container_name: ngx-waha
    ports:
      - "3000:3000"
    environment:
      WHATSAPP_DEFAULT_ENGINE: WEBJS
      WAHA_PRINT_QR: "true"
    volumes:
      - waha_data:/app/.sessions
    restart: unless-stopped

  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ngx-trading-bot
    depends_on:
      postgres:
        condition: service_healthy
      waha:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_USERNAME: ${DB_USERNAME:-trader}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ngx_trading
      EODHD_API_KEY: ${EODHD_API_KEY}
      MERITRADE_USERNAME: ${MERITRADE_USERNAME}
      MERITRADE_PASSWORD: ${MERITRADE_PASSWORD}
      WHATSAPP_CHAT_ID: ${WHATSAPP_CHAT_ID}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      AI_ENABLED: ${AI_ENABLED:-false}
      AI_API_KEY: ${AI_API_KEY:-}
    volumes:
      - screenshots:/app/screenshots
      - bot_logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  waha_data:
    driver: local
  screenshots:
    driver: local
  bot_logs:
    driver: local
